<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FundLoop | Institutional-Grade Chama Management</title>
    <meta name="description" content="FundLoop — Secure, transparent, and automated Chama management for institutional investment groups." />

    <!-- Tailwind CSS CDN -->

    <!-- Google Fonts -->

    <!-- Material Symbols -->

    <!-- Shared Tailwind config (all pages use same theme) -->

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              /* Exact colors from all original HTML files */
              "primary": "#001e40",
              "on-primary": "#ffffff",
              "primary-container": "#003366",

              "secondary": "#7f5700",
              "on-secondary": "#ffffff",
              "secondary-container": "#feb316",
              "on-secondary-container": "#6a4800",
              "secondary-fixed": "#ffdead",
              "secondary-fixed-dim": "#ffba3b",
              "on-secondary-fixed": "#281900",
              "on-secondary-fixed-variant": "#604100",

              "tertiary": "#141f2f",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#293446",
              "on-tertiary-container": "#919cb2",
              "tertiary-fixed": "#d8e3fa",
              "tertiary-fixed-dim": "#bcc7dd",
              "on-tertiary-fixed": "#111c2c",
              "on-tertiary-fixed-variant": "#3c475a",

              "error": "#ba1a1a",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",

              "surface": "#f7f9fb",
              "on-surface": "#191c1e",
              "surface-variant": "#e0e3e5",
              "on-surface-variant": "#43474f",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f2f4f6",
              "surface-container": "#eceef0",
              "surface-container-high": "#e6e8ea",
              "surface-container-highest": "#e0e3e5",
              "surface-bright": "#f7f9fb",
              "surface-dim": "#d8dadc",
              "surface-tint": "#3a5f94",

              "background": "#f7f9fb",
              "on-background": "#191c1e",

              "outline": "#737780",
              "outline-variant": "#c3c6d1",

              "inverse-surface": "#2d3133",
              "inverse-on-surface": "#eff1f3",

            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              "3xl": "64px",
              md: "16px",
              xs: "4px",
              gutter: "24px",
              "2xl": "48px",
              lg: "24px",
              xl: "32px",
              base: "4px",
              sm: "8px",
              "margin-desktop": "40px",
              "margin-mobile": "16px",
              "stack-xs": "4px",
              "stack-sm": "8px",
              "stack-md": "16px",
              "stack-lg": "24px",
              "stack-xl": "48px",
              "sidebar-width": "260px",
              "container-max": "1440px",
            },
            fontFamily: {
              "body-md": ["Inter"],

            fontSize: {

              "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
              "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "600" }],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
              "headline-lg-mobile": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "600" }],
              "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],

              "code-md": ["14px", { lineHeight: "20px", letterSpacing: "0em", fontWeight: "500" }],
            },
          },
        },
      };
    </script>

    <style>
      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
      }
      .matrix-grid {
        background-image: radial-gradient(circle, #001e40 1px, transparent 1px);
        background-size: 32px 32px;
        opacity: 0.05;
      }
      .security-shield-animate {
        animation: shield-pulse 4s ease-in-out infinite;
      }
      @keyframes shield-pulse {
        0%, 100% { opacity: 0.05; transform: scale(1); }
        50% { opacity: 0.1; transform: scale(1.05); }
      }
      .login-card-shadow { box-shadow: 0px 12px 24px rgba(0, 51, 102, 0.1); }
      .step-transition { transition: all 0.3s ease-in-out; }
      .card-active { border-color: #003366 !important; background-color: #f2f4f6; }
      .chama-card:hover {
        background-color: #f1f5f9;
        transform: translateY(-2px);
        transition: all 0.2s ease-in-out;
      }
      .tonal-layer-1 { background-color: #ffffff; border: 1px solid #e2e8f0; }
      .tonal-layer-2 { background-color: #ffffff; box-shadow: 0px 4px 20px rgba(0,0,0,0.08); }
      .settings-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        transition: all 0.2s ease;
      }
      .settings-card:hover { border-color: #cbd5e1; }
      .bento-card {
        background: #ffffff;
        border: 1px solid #E2E8F0;
        border-radius: 4px;
        padding: 24px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .bento-card:hover { border-color: #001e40; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #e0e3e5; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #c3c6d1; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="bg-surface text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
